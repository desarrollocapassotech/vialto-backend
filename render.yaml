services:
  - type: web
    name: vialto-backend
    runtime: node
    region: ohio
    plan: free
    # Migraciones en `start:prod` (package.json): el build no necesita alcanzar Neon.
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_URL_UNPOOLED
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
