# Monorepo: Render usa el blueprint de la RAÍZ → `../render.yaml` (rootDir: vialto-backend).
# Si este backend es el repo entero, este archivo sirve igual sin rootDir.
services:
  - type: web
    name: vialto-backend
    runtime: node
    region: ohio
    plan: free
    buildCommand: NPM_CONFIG_PRODUCTION=false npm install && npx prisma generate && npx @nestjs/cli build
    startCommand: npm run start:prod
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_URL_UNPOOLED
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
