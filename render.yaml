services:
  - type: web
    name: vialto-backend
    runtime: node
    region: ohio
    plan: free
    # Sin `prisma migrate deploy` aquí (va en start:prod). Sin `npm run build` para evitar
    # comandos duplicados si el panel de Render tuviera algo distinto guardado antes.
    buildCommand: npm install && npx prisma generate && npx nest build
    startCommand: npm run start:prod
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_URL_UNPOOLED
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
